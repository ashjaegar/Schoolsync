<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>School Admin Login – SchoolERP</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="auth-layout" style="align-items:center;justify-content:center">
    <div class="auth-card" style="max-width:440px">
      <a class="back-link" href="index.html" style="color:#64748b">← Back to Home</a>
      <div class="auth-card-header">
        <div class="badge">🏫 School Admin</div>
        <h2>Admin Sign In</h2>
        <p>Access your school management portal</p>
      </div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="principal@yourschool.edu" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required/>
        </div>
        <label class="show-pw-row">
          <input type="checkbox" id="showPw"/> Show password
        </label>
        <div class="alert alert-error" id="errMsg"></div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Sign In to Admin Panel</button>
      </form>
      <p class="auth-footer-link">New school? <a href="school-register.html">Register here</a></p>
    </div>
  </div>
  <script>
    if (localStorage.getItem('school_id')) location.href = 'dashboard.html';
    document.getElementById('showPw').onchange = e =>
      document.getElementById('password').type = e.target.checked ? 'text' : 'password';

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const err = document.getElementById('errMsg');
      err.className = 'alert';
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { err.textContent='All fields required.'; err.className='alert alert-error show'; return; }
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res  = await fetch('/api/school/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('school_id',   data.school_id);
          localStorage.setItem('school_name', data.school_name);
          location.href = 'dashboard.html';
        } else {
          err.textContent = data.message; err.className = 'alert alert-error show';
        }
      } catch { err.textContent='Cannot reach server.'; err.className='alert alert-error show'; }
      finally { btn.disabled=false; btn.textContent='Sign In to Admin Panel'; }
    });
  </script>
</body>
</html>
