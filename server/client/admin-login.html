<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login – SchoolERP</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-layout" style="align-items:center;justify-content:center">
  <div class="auth-card" style="max-width:440px">
    <a href="index.html" class="back-link" style="color:#64748b">← Back to Website</a>
    <div class="auth-card-header">
      <div class="badge" style="background:#fef2f2;color:#dc2626">🔐 School Admin</div>
      <h2>Admin Login</h2>
      <p>Access your school management portal</p>
    </div>
    <form id="loginForm" novalidate>
      <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="admin@school.edu" required/></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" required/></div>
      <label class="show-pw-row"><input type="checkbox" id="sp"/> Show password</label>
      <div class="alert alert-error" id="err"></div>
      <button type="submit" class="btn btn-primary" id="btn">Sign In as Admin</button>
    </form>
    <p class="auth-footer-link">New school? <a href="school-register.html">Register here</a></p>
  </div>
</div>
<script>
  if(localStorage.getItem('school_id')&&localStorage.getItem('role')==='admin') location.href='dashboard.html';
  document.getElementById('sp').onchange=e=>document.getElementById('password').type=e.target.checked?'text':'password';
  document.getElementById('loginForm').addEventListener('submit',async e=>{
    e.preventDefault();const err=document.getElementById('err');err.className='alert';
    const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;
    if(!email||!password){err.textContent='All fields required.';err.className='alert alert-error show';return;}
    const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Signing in…';
    try{
      const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const d=await r.json();
      if(d.success){localStorage.setItem('school_id',d.school_id);localStorage.setItem('school_name',d.school_name);localStorage.setItem('role','admin');location.href='dashboard.html';}
      else{err.textContent=d.message;err.className='alert alert-error show';}
    }catch{err.textContent='Cannot reach server.';err.className='alert alert-error show';}
    finally{btn.disabled=false;btn.textContent='Sign In as Admin';}
  });
</script>
</body></html>
